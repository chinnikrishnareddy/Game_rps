<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Choices</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="Mainhead">Rock Paper Scissors</h1>
    </header>
    <main>
        <div class="scoreboard">
            <div class="userscore">
                <h4>YOU</h4>
                <p id="userscore">0</p>
            </div>
            <div class="compscore">
                <h4>COMP</h4>
                <p id="compscore">0</p>
            </div>
        </div>
        <div class="winnerboard">
            <h2 class="choosetitle">Choose your weapon</h2>
            <p class="quote">Choose with Great mind!</p>
        </div>
        <div class="choices">
            <div class="choice" id="rock" > </div>
            <div class="choice" id="paper"></div>
            <div class="choice" id="scissors"></div>
        </div>
    </main>

    
</body>
</html>
