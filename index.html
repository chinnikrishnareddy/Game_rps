<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash of Choices</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="Main head">Rock Paper Scissors</h1>
    </header>
    <main>
        <div class="scoreboard">
            <div class="userscore">
                <h4>YOU</h4>
                <p id="userscore">0</p>
            </div>
            <div class="compscore">
                <h4>COMP</h4>
                <p id="compscore">0</p>
            </div>
        </div>
        <div><h4 class="choosetitle">Choose your weapon</p></div>
        <div class="choices">
            <div class="choice" id="rock" ><img src="rock.png"> </div>
            <div class="choice" id="paper"><img src="paper.png"></div>
            <div class="choice" id="scissors"><img src="scissors.png"></div>
        </div>
    </main>

    
</body>
</html>
